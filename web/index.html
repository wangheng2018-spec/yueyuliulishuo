<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="粤语流利说">
  <meta name="theme-color" content="#FF6B6B">
  <link rel="manifest" href="manifest.json">
  <title>粤语流利说</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;background:#fff;color:#333}
    .app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:#fff}
    header{background:linear-gradient(135deg,#FF6B6B,#FF8E53);padding:16px;color:#fff;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    header h1{font-size:18px;font-weight:600}
    .tab-bar{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;max-width:480px;margin:0 auto;z-index:10}
    .tab-bar button{flex:1;padding:8px 0 6px;border:none;background:none;font-size:10px;color:#999;text-align:center;cursor:pointer}
    .tab-bar button.active{color:#FF6B6B}
    .tab-bar .icon{font-size:22px;display:block;margin-bottom:2px}
    .page{padding:16px;padding-bottom:80px;display:none}
    .page.active{display:block}
    .banner{background:linear-gradient(135deg,#FF6B6B,#FF8E53);border-radius:14px;padding:20px;color:#fff;margin-bottom:14px}
    .banner h2{font-size:20px;margin-bottom:4px}
    .banner p{font-size:13px;opacity:.9}
    .vip-card{background:linear-gradient(135deg,#FFD700,#FFA500);border-radius:12px;padding:14px 20px;color:#fff;margin-bottom:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
    .section-title{font-size:17px;font-weight:600;margin:16px 0 10px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    .grid-item{background:#f5f5f5;border-radius:10px;padding:12px 6px;text-align:center;cursor:pointer}
    .grid-item .emoji{font-size:24px;display:block;margin-bottom:4px}
    .grid-item span{font-size:11px}
    .course-card{display:flex;align-items:center;background:#f8f8f8;border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer}
    .course-icon{width:50px;height:50px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px}
    .course-info{flex:1;margin-left:12px}
    .course-info h3{font-size:15px}
    .course-info p{font-size:12px;color:#999;margin-top:2px}
    .lesson-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0}
    .lesson-num{width:32px;height:32px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
    .lesson-info{flex:1;margin-left:12px}
    .lesson-info h4{font-size:14px}
    .dialog-card{background:#f8f8f8;border-radius:14px;padding:16px;margin-bottom:14px}
    .dialog-cantonese{font-size:19px;text-align:center;margin:10px 0}
    .dialog-jyutping{font-size:12px;color:#999;text-align:center;font-style:italic}
    .dialog-nav{display:flex;justify-content:space-between;margin-top:12px}
    .dialog-nav button{padding:6px 16px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px}
    .dialog-nav button.primary{background:#FF6B6B;color:#fff;border-color:#FF6B6B}
    .vocab-item{background:#f8f8f8;border-radius:10px;padding:12px;margin-bottom:8px}
    .tip-item{display:flex;align-items:center;background:#FFF8E1;border-radius:10px;padding:10px 12px;margin-bottom:8px;gap:8px}
    .practice-item{display:flex;align-items:center;background:#f8f8f8;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer}
    .stats-row{display:flex;gap:10px;margin-bottom:16px}
    .stat-card{flex:1;background:#f5f5f5;border-radius:10px;padding:12px 6px;text-align:center}
    .stat-card .num{font-size:18px;font-weight:700}
    .stat-card .lbl{font-size:11px;color:#999;margin-top:2px}
    .ai-message{display:flex;margin-bottom:12px;align-items:flex-start}
    .ai-message.user{flex-direction:row-reverse}
    .ai-bubble{max-width:75%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5}
    .ai-message.ai .ai-bubble{background:#f0f0f0}
    .ai-message.user .ai-bubble{background:#FF6B6B;color:#fff}
    .vip-plan{display:flex;align-items:center;padding:14px;border-radius:10px;margin-bottom:10px;background:#f8f8f8;border:2px solid transparent;cursor:pointer}
    .vip-plan.selected{background:#FFF8E1;border-color:#FFA500}
    .purchase-btn{background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;width:100%;cursor:pointer;margin-top:8px}
    .completed-btn{background:#4CAF50;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;width:100%;cursor:pointer;margin:20px 0}
    .scenario-chips{display:flex;gap:6px;overflow-x:auto;padding:6px 0;margin-bottom:8px}
    .scenario-chip{padding:4px 12px;border-radius:14px;font-size:12px;border:none;cursor:pointer;white-space:nowrap}
    .scenario-chip.active{background:#FF6B6B;color:#fff}
    .scenario-chip:not(.active){background:#e8e8e8;color:#333}
    .ai-input{display:flex;gap:8px;padding:10px;border-top:1px solid #eee}
    .ai-input input{flex:1;border:1px solid #ddd;border-radius:20px;padding:10px 14px;font-size:14px;outline:none}
    .ai-input button{width:36px;height:36px;border-radius:50%;background:#FF6B6B;color:#fff;border:none;font-size:16px;cursor:pointer}
    .cat-progress{margin-bottom:8px}
    .cat-progress .bar{height:6px;background:#eee;border-radius:3px;overflow:hidden}
    .cat-progress .fill{height:100%;background:#FF6B6B;border-radius:3px}
    .challenge-card{background:#f5f5f5;border-radius:12px;padding:14px;margin-bottom:16px}
    ::-webkit-scrollbar{display:none}
  </style>
</head><body><div class="app" id="app"><header><h1 id="headerTitle">粤语流利说</h1><div id="headerControls" style="display:none;gap:4px"><button onclick="toggleTranslation()" style="background:none;border:none;color:#fff;font-size:16px;cursor:pointer">🌐</button><button onclick="goBack()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer">←</button></div></header>
<div id="page-home" class="page active">
  <div class="banner"><h2 id="bannerTitle">每日学粤语</h2><p id="bannerDesc">每天15分钟，轻松学会粤语沟通</p><p id="streakText" style="margin-top:6px;font-size:12px">🔥 已连续学习 0 天</p></div>
  <div id="vipPromo" class="vip-card" onclick="showPage('shop')"><div><h3>解锁全部课程 🎉</h3><span>1元试用 · 9.9元/月 · 99元永久</span></div><div style="font-size:28px">👑</div></div>
  <div class="stats-row" id="statsRow"></div>
  <div class="section-title">课程分类</div>
  <div class="grid-4" id="categoryGrid"></div>
  <div class="section-title">今日挑战</div>
  <div class="challenge-card"><div style="font-weight:500">学习15个新词汇</div><div style="height:8px;background:#e0e0e0;border-radius:4px;margin:8px 0;overflow:hidden"><div style="width:60%;height:100%;background:#FF6B6B;border-radius:4px"></div></div><div style="font-size:12px;color:#999">已完成 9/15</div></div>
</div>
<div id="page-courses" class="page"><div class="scenario-chips" id="courseChips"></div><div id="courseList"></div></div>
<div id="page-course-detail" class="page">
  <div id="courseDetailHeader" class="banner" style="text-align:center;padding:24px 16px"><div id="cdIcon" style="font-size:40px;margin-bottom:8px"></div><h2 id="cdTitle"></h2><p id="cdDesc" style="font-size:13px;margin-top:4px"></p></div>
  <div class="section-title">课程列表</div><div id="lessonList"></div>
</div>
<div id="page-lesson" class="page">
  <div id="dialogSection"></div><div id="vocabSection"></div><div id="tipSection"></div><div id="practiceSection"></div>
  <button class="completed-btn" onclick="completeLesson()">✓ 标记为已学完</button>
</div>
<div id="page-ai" class="page"><div id="aiContent"></div></div>
<div id="page-profile" class="page">
  <div style="text-align:center;padding:16px"><div style="width:56px;height:56px;border-radius:28px;background:#FF6B6B;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px">学</div><div style="font-size:16px;font-weight:600">学习者</div><div style="font-size:11px;color:#999">⭐ Lv.1 · 0 XP</div></div>
  <div id="profileVip" class="vip-card" onclick="showPage('shop')" style="margin-bottom:16px"><h3>开通VIP会员</h3><span style="font-size:10px">解锁全部课程与AI陪练</span></div>
  <div class="section-title">学习统计</div><div id="profileStats"></div>
  <div class="section-title">分类进度</div><div id="profileCats"></div>
</div>
<div id="page-shop" class="page">
  <div style="text-align:center;padding:16px"><div style="font-size:50px;margin-bottom:8px">👑</div><h2>解锁全部粤语课程</h2><p style="font-size:12px;color:#999;margin-top:6px">包含AI陪练、离线下载、每日挑战等全部功能</p></div>
  <div style="padding:0 4px;margin-bottom:12px"><div class="section-title">VIP权益</div><div id="vipFeatures"></div></div>
  <div id="vipPlans"></div>
  <button class="purchase-btn" onclick="purchaseVip()" id="purchaseBtn">立即开通</button>
  <p style="font-size:9px;color:#bbb;text-align:center;margin:16px 0">永久会员一次购买终身有效</p>
</div>
<div class="tab-bar">
  <button id="tab-home" class="active" onclick="showPage('home')"><span class="icon">🏠</span>首页</button>
  <button id="tab-courses" onclick="showPage('courses')"><span class="icon">📚</span>课程</button>
  <button id="tab-ai" onclick="showPage('ai')"><span class="icon">🎤</span>AI陪练</button>
  <button id="tab-profile" onclick="showPage('profile')"><span class="icon">👤</span>我的</button>
</div>
</div>
<script src="app.js"></script></body></html>
